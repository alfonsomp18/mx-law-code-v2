<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>alfonsomp18 — GitHub Repos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 860px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header img {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid #30363d;
    }

    header h1 {
      font-size: 1.4rem;
      color: #f0f6fc;
    }

    header p {
      font-size: 0.85rem;
      color: #8b949e;
    }

    #search {
      display: block;
      max-width: 860px;
      margin: 0 auto 1.5rem;
      width: 100%;
      padding: 0.55rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: #58a6ff; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.15s, transform 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .card-name svg { flex-shrink: 0; opacity: 0.6; }

    .card-desc {
      font-size: 0.82rem;
      color: #8b949e;
      flex: 1;
      line-height: 1.45;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.78rem;
      color: #8b949e;
      margin-top: 0.3rem;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; background: #f0883e; }

    #status {
      text-align: center;
      color: #8b949e;
      font-size: 0.9rem;
      max-width: 860px;
      margin: 2rem auto;
    }

    #count {
      text-align: center;
      font-size: 0.8rem;
      color: #8b949e;
      max-width: 860px;
      margin: 0 auto 1rem;
    }
  </style>
</head>
<body>

<header>
  <img src="https://github.com/alfonsomp18.png" alt="alfonsomp18 avatar" />
  <div>
    <h1>alfonsomp18</h1>
    <p>GitHub Repositories</p>
  </div>
</header>

<input id="search" type="text" placeholder="Filter repositories…" />
<p id="count"></p>
<div id="grid"></div>
<p id="status">Loading…</p>

<script>
  const GITHUB_USER = 'alfonsomp18';
  const grid = document.getElementById('grid');
  const status = document.getElementById('status');
  const searchInput = document.getElementById('search');
  const countEl = document.getElementById('count');

  let allRepos = [];

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso);
    const d = Math.floor(diff / 86400000);
    if (d === 0) return 'today';
    if (d === 1) return 'yesterday';
    if (d < 30) return `${d} days ago`;
    const m = Math.floor(d / 30);
    if (m < 12) return `${m} month${m > 1 ? 's' : ''} ago`;
    const y = Math.floor(m / 12);
    return `${y} year${y > 1 ? 's' : ''} ago`;
  }

  function repoIcon() {
    return `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/>
    </svg>`;
  }

  function renderRepos(repos) {
    grid.innerHTML = '';
    countEl.textContent = `${repos.length} repositor${repos.length === 1 ? 'y' : 'ies'}`;

    if (repos.length === 0) {
      status.textContent = 'No repositories match your filter.';
      status.style.display = 'block';
      return;
    }

    status.style.display = 'none';
    repos.forEach(repo => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = repo.html_url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = `
        <div class="card-name">${repoIcon()} ${repo.name}</div>
        <div class="card-desc">${repo.description || '<em>No description</em>'}</div>
        <div class="card-meta">
          ${repo.language ? `<span class="dot" style="background:${langColor(repo.language)}"></span><span>${repo.language}</span>` : ''}
          <span>⭐ ${repo.stargazers_count}</span>
          <span>Updated ${timeAgo(repo.updated_at)}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function langColor(lang) {
    const colors = { JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5', HTML:'#e34c26', CSS:'#563d7c', Shell:'#89e051', Go:'#00ADD8', Rust:'#dea584', Java:'#b07219' };
    return colors[lang] || '#8b949e';
  }

  async function fetchRepos() {
    try {
      const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&sort=updated`);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
      allRepos = await res.json();
      status.style.display = 'none';
      renderRepos(allRepos);
    } catch (err) {
      status.textContent = `Failed to load repos: ${err.message}`;
    }
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase();
    renderRepos(allRepos.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.description || '').toLowerCase().includes(q)
    ));
  });

  fetchRepos();
</script>
</body>
</html>
